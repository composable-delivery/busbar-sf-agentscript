name: Release (binaries)

# Publishes binary artifacts: VS Code extension, LSP binaries, Zed extension,
# and Rust crates to crates.io.
#
# npm packages (@muselab/busbar-sf-agentscript, @muselab/sf-plugin-busbar-agency,
# @muselab/tree-sitter-agentscript) are published automatically by the
# Changesets workflow — do NOT publish them here.
#
# Tag conventions:
#   vscode-v0.1.0  →  VS Code extension + LSP binaries
#   lsp-v0.1.0     →  LSP binaries + crates.io (no VS Code)
#   v0.1.0         →  everything above together

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"         # full:   v0.1.0
      - "v[0-9]+.[0-9]+.[0-9]+-*"       # pre:    v0.1.0-beta.1
      - "vscode-v[0-9]+.[0-9]+.[0-9]+*" # vscode: vscode-v0.1.0
      - "lsp-v[0-9]+.[0-9]+.[0-9]+*"    # lsp:    lsp-v0.1.0
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0, vscode-v0.1.0, lsp-v0.1.0)"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      version:      ${{ steps.parse.outputs.version }}
      scope:        ${{ steps.parse.outputs.scope }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
      release_name: ${{ steps.parse.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse tag
        id: parse
        run: |
          TAG="${{ github.ref_name }}"
          [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.tag }}" ]] \
            && TAG="${{ github.event.inputs.tag }}"

          if   [[ "$TAG" == vscode-v* ]]; then SCOPE="vscode"; VERSION="${TAG#vscode-v}"
          elif [[ "$TAG" == lsp-v* ]];    then SCOPE="lsp";    VERSION="${TAG#lsp-v}"
          else                                 SCOPE="all";    VERSION="${TAG#v}"
          fi

          [[ "$VERSION" == *-* ]] && IS_PRE=true || IS_PRE=false

          declare -A NAMES=(["all"]="" ["vscode"]="VS Code Extension " ["lsp"]="LSP + Crates ")
          RELEASE_NAME="${NAMES[$SCOPE]}v${VERSION}"

          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "scope=$SCOPE"               >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRE"      >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "Releasing: $RELEASE_NAME (scope=$SCOPE)"

  # ── Rust crates ─────────────────────────────────────────────────────────────
  publish-crates:
    name: Publish crates to crates.io
    runs-on: ubuntu-latest
    needs: [validate]
    if: |
      needs.validate.outputs.is_prerelease == 'false' &&
      contains(fromJSON('["all","lsp"]'), needs.validate.outputs.scope)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish -p busbar-sf-agentscript
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20   # let crates.io index propagate
      - run: cargo publish -p busbar-sf-agentscript-lsp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── LSP binaries ─────────────────────────────────────────────────────────────
  build-lsp:
    name: Build LSP / ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: [validate]
    if: contains(fromJSON('["all","lsp","vscode"]'), needs.validate.outputs.scope)
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build -p busbar-sf-agentscript-lsp --release --target ${{ matrix.target }}
      - name: Rename binary (Unix)
        if: matrix.target != 'x86_64-pc-windows-msvc'
        run: |
          cp target/${{ matrix.target }}/release/busbar-sf-agentscript-lsp \
             busbar-sf-agentscript-lsp-${{ matrix.target }}
      - name: Rename binary (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/busbar-sf-agentscript-lsp.exe" `
                    "busbar-sf-agentscript-lsp-${{ matrix.target }}.exe"
      - uses: actions/upload-artifact@v4
        if: matrix.target != 'x86_64-pc-windows-msvc'
        with:
          name: lsp-${{ matrix.target }}
          path: busbar-sf-agentscript-lsp-${{ matrix.target }}
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        if: matrix.target == 'x86_64-pc-windows-msvc'
        with:
          name: lsp-${{ matrix.target }}
          path: busbar-sf-agentscript-lsp-${{ matrix.target }}.exe
          if-no-files-found: error

  # ── Zed extension ────────────────────────────────────────────────────────────
  build-zed-extension:
    name: Build Zed extension
    runs-on: ubuntu-latest
    needs: [validate]
    if: needs.validate.outputs.scope == 'all'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
        with:
          key: zed-wasm32-wasip2
          workspaces: zed-extension
      - run: cargo build --release --manifest-path zed-extension/Cargo.toml --target wasm32-wasip2
      - run: cp zed-extension/target/wasm32-wasip2/release/busbar_sf_agentscript_zed.wasm zed-extension/extension.wasm
      - uses: actions/upload-artifact@v4
        with:
          name: zed-extension
          path: |
            zed-extension/extension.wasm
            zed-extension/extension.toml
          if-no-files-found: error

  # ── VS Code extension ─────────────────────────────────────────────────────────
  package-vscode:
    name: Package VS Code / ${{ matrix.vsce_target }}
    runs-on: ubuntu-latest
    needs: [validate, build-lsp]
    if: contains(fromJSON('["all","vscode"]'), needs.validate.outputs.scope)
    strategy:
      fail-fast: false
      matrix:
        include:
          - vsce_target: linux-x64
            lsp_target: x86_64-unknown-linux-gnu
            lsp_ext: ""
          - vsce_target: darwin-arm64
            lsp_target: aarch64-apple-darwin
            lsp_ext: ""
          - vsce_target: win32-x64
            lsp_target: x86_64-pc-windows-msvc
            lsp_ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/package-lock.json
      - uses: actions/download-artifact@v4
        with:
          name: lsp-${{ matrix.lsp_target }}
          path: packages/bin/
      - name: Prepare LSP binary
        run: |
          chmod +x packages/bin/busbar-sf-agentscript-lsp-${{ matrix.lsp_target }}${{ matrix.lsp_ext }} 2>/dev/null || true
          mv packages/bin/busbar-sf-agentscript-lsp-${{ matrix.lsp_target }}${{ matrix.lsp_ext }} \
             packages/bin/busbar-sf-agentscript-lsp${{ matrix.lsp_ext }}
      - run: npm ci
        working-directory: packages/
      - run: npm run compile
        working-directory: packages/
      - name: Package VSIX
        working-directory: packages/
        run: |
          npx vsce package --target ${{ matrix.vsce_target }} \
            --out vscode-agentscript-${{ needs.validate.outputs.version }}-${{ matrix.vsce_target }}.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vsce_target }}
          path: packages/vscode-agentscript-${{ needs.validate.outputs.version }}-${{ matrix.vsce_target }}.vsix
          if-no-files-found: error
      - name: Publish to VS Code Marketplace
        working-directory: packages/
        run: npx vsce publish --target ${{ matrix.vsce_target }} --pat ${{ secrets.VS_CODE_MARKETPLACE_TOKEN }}

  # ── GitHub Release ────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build-lsp, build-zed-extension, package-vscode, publish-crates]
    if: always() && !failure() && !cancelled()
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
        continue-on-error: true   # some artifact types won't exist for scoped releases
      - name: Assemble upload files
        run: |
          mkdir -p release-upload
          find release-artifacts/ -type f \
            \( -name "*.vsix" -o -name "busbar-sf-agentscript-lsp-*" \) \
            -exec cp {} release-upload/ \; 2>/dev/null || true
          [[ -d release-artifacts/zed-extension ]] && \
            (cd release-artifacts/zed-extension && zip -r ../../release-upload/zed-extension.zip .) || true
          echo "Upload contents:"
          ls -lh release-upload/ 2>/dev/null || echo "(none)"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ needs.validate.outputs.release_name }}
          generate_release_notes: true
          files: release-upload/*
